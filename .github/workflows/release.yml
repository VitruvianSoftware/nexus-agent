# Publish-on-version-bump. The monorepo (vitruvian-core) authors nexus-agent's
# version bump via release-please (bumping .release-please-manifest.json AND
# macos/Sources/NexusAgent/Version.swift via extra-files), exported here. When
# the exported version has no matching tag yet, this is a new release: tag the
# exported commit, build the universal macOS app, publish the DMGs/ZIP, and
# update the Homebrew cask -- all with the mirror's existing RELEASE_AUTOMATION_
# TOKEN. Replaces the in-mirror release-please job (now in the monorepo).
#
# TAG SCHEME: this tags plain `vX.Y.Z` (matching the cask URL, which fixes the
# old bug where releases were tagged `nexus-agent-vX.Y.Z` but the cask pointed
# at `vX.Y.Z` -> brew install 404). The detect step also treats the LEGACY
# `nexus-agent-v$V` tag as "already released" so the cutover (current version
# 1.10.2, tagged nexus-agent-v1.10.2) is a NO-OP instead of a spurious rebuild.
name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}

      - id: detect
        name: Detect a new release from the exported manifest
        run: |
          if [ ! -f .release-please-manifest.json ]; then
            echo "No manifest yet -- monorepo release-please has not cut a release."
            exit 0
          fi
          V="$(jq -r 'to_entries[0].value' .release-please-manifest.json)"
          if [ -z "$V" ] || [ "$V" = "null" ]; then
            echo "No version in manifest."
            exit 0
          fi
          # New plain tag OR the legacy component-prefixed tag => already released.
          if git rev-parse "v$V" >/dev/null 2>&1 || git rev-parse "nexus-agent-v$V" >/dev/null 2>&1; then
            echo "v$V (or legacy nexus-agent-v$V) already released -- nothing to do."
          else
            echo "version=$V" >> "$GITHUB_OUTPUT"
            echo "Detected new release v$V."
          fi

      - name: Tag the exported commit + create the release
        if: steps.detect.outputs.version
        env:
          GH_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
        run: |
          V="${{ steps.detect.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$V" -m "Release v$V"
          git push origin "v$V"
          gh release create "v$V" --title "v$V" --generate-notes

  build-macos:
    needs: detect
    if: needs.detect.outputs.version
    runs-on: macos-15
    timeout-minutes: 45
    strategy:
      matrix:
        arch: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Build for ${{ matrix.arch }}
        run: |
          cd macos
          swift build -c release --arch ${{ matrix.arch }}

      - name: Upload arch binary
        uses: actions/upload-artifact@v4
        with:
          name: NexusAgent-${{ matrix.arch }}
          path: macos/.build/release/NexusAgent

  package:
    needs: [detect, build-macos]
    if: needs.detect.outputs.version
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: NexusAgent-arm64
          path: /tmp/arm64

      - name: Download x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: NexusAgent-x86_64
          path: /tmp/x86_64

      - name: Create universal binary
        run: |
          mkdir -p /tmp/universal
          lipo -create \
            /tmp/arm64/NexusAgent \
            /tmp/x86_64/NexusAgent \
            -output /tmp/universal/NexusAgent
          echo "==> Universal binary architectures:"
          lipo -info /tmp/universal/NexusAgent

      - name: Assemble .app bundles
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          chmod +x macos/scripts/bundle.sh

          # Universal
          mkdir -p /tmp/dist-universal
          macos/scripts/bundle.sh /tmp/universal/NexusAgent "$VERSION" /tmp/dist-universal

          # arm64
          mkdir -p /tmp/dist-arm64
          macos/scripts/bundle.sh /tmp/arm64/NexusAgent "$VERSION" /tmp/dist-arm64

          # x86_64
          mkdir -p /tmp/dist-x86_64
          macos/scripts/bundle.sh /tmp/x86_64/NexusAgent "$VERSION" /tmp/dist-x86_64

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMGs
        run: |
          VERSION="${{ needs.detect.outputs.version }}"

          for arch in universal arm64 x86_64; do
            create-dmg \
              --volname "NexusAgent" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 100 \
              --icon "NexusAgent.app" 175 190 \
              --app-drop-link 425 190 \
              --no-internet-enable \
              "NexusAgent-${VERSION}-${arch}.dmg" \
              "/tmp/dist-${arch}/" || true
          done

          ls -lh *.dmg

      - name: Create ZIP for auto-updater
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          cd /tmp/dist-universal
          zip -r "${GITHUB_WORKSPACE}/NexusAgent-${VERSION}-universal.zip" NexusAgent.app
          cd "${GITHUB_WORKSPACE}"
          ls -lh *.zip

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          TAG="v${VERSION}"

          for f in *.dmg *.zip; do
            echo "Uploading $f..."
            gh release upload "$TAG" "$f" --clobber
          done

      - name: Update Homebrew Cask
        env:
          GH_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          DMG_FILE="NexusAgent-${VERSION}-universal.dmg"

          # Calculate SHA256 of the universal dmg
          SHA256=$(shasum -a 256 "$DMG_FILE" | awk '{print $1}')

          # Clone the tap repository
          git clone https://x-access-token:${GH_TOKEN}@github.com/VitruvianSoftware/homebrew-tap.git tap-repo
          cd tap-repo

          # Ensure Casks directory exists
          mkdir -p Casks

          # Write the Cask formula. The url tag (vX.Y.Z) now matches the release
          # tag created above -- this is the fix for the old 404 (releases were
          # tagged nexus-agent-vX while the cask pointed at vX).
          cat > Casks/nexus-agent.rb << EOF
          cask "nexus-agent" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/VitruvianSoftware/nexus-agent/releases/download/v${VERSION}/${DMG_FILE}"
            name "NexusAgent"
            desc "Advanced multi-provider agent GUI"
            homepage "https://github.com/VitruvianSoftware/nexus-agent"

            app "NexusAgent.app"
          end
          EOF

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/nexus-agent.rb
          git commit -m "chore: update nexus-agent Cask to v${VERSION}" || echo "No changes to commit"
          git push origin main
